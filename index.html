<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>고려대학교 국어국문학과 - 추천서 작성 시스템 (Web)</title>
  <!-- Google Fonts for scholarly and clean aesthetics -->
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <!-- Import Map to load Google Gemini SDK directly in the browser -->
  <script type="importmap">
    {
      "imports": {
        "@google/generative-ai": "https://esm.run/@google/generative-ai"
      }
    }
  </script>
</head>
<body>
  <div class="app-container">
    <!-- 1. LEFT SIDEBAR: STUDENT LIST -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="ku-logo-placeholder"></div>
        <div class="header-titles">
          <h1>고려대학교</h1>
          <h2>국어국문학과 추천서 작성기</h2>
        </div>
      </div>
      
      <div class="search-box">
        <input type="text" id="search-input" placeholder="학생 이름 또는 학번 검색..." />
        <span class="search-icon">🔍</span>
      </div>

      <div class="student-list-container">
        <ul id="student-list" class="student-list">
          <!-- Student list items will be injected here -->
        </ul>
      </div>

      <div class="sidebar-actions-grid">
        <button id="add-student-btn" class="btn btn-secondary">
          <span class="btn-icon">+</span> 학생 정보 추가
        </button>
        <div class="btn-group-row">
          <button id="import-btn" class="btn btn-secondary btn-small">📂 CSV 가져오기</button>
          <button id="export-btn" class="btn btn-secondary btn-small">💾 CSV 내보내기</button>
        </div>
        <input type="file" id="csv-file-input" accept=".csv" class="hidden" />
      </div>
    </aside>

    <!-- 2. CENTER PANEL: STUDENT DETAIL & KEYWORDS -->
    <main class="main-content">
      <div id="no-student-selected" class="no-selection">
        <div class="academic-crest"></div>
        <p>왼쪽 목록에서 학생을 선택하거나,<br>'학생 정보 추가'를 눌러 새로운 학생을 등록해주세요.</p>
      </div>

      <div id="student-detail-panel" class="detail-panel hidden">
        <section class="student-info-section card">
          <div class="card-header">
            <h3>학생 인적사항 및 정보</h3>
            <span class="status-indicator-tag" id="sync-status">자동 저장 활성</span>
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label for="student-name">이름</label>
              <input type="text" id="student-name" placeholder="예: 홍길동" />
            </div>
            <div class="form-group">
              <label for="student-id">학번</label>
              <input type="text" id="student-id" placeholder="예: 2022120345" />
            </div>
            <div class="form-group full-width">
              <label for="student-contact">연락처</label>
              <input type="text" id="student-contact" placeholder="예: 010-1234-5678" />
            </div>
            <div class="form-group full-width">
              <label for="student-grade">학업성적</label>
              <input type="text" id="student-grade" placeholder="예: 전공 GPA 4.2/4.5, 국문학사 A+" />
            </div>
            <div class="form-group full-width">
              <label for="student-notes">특이사항 (교수 관찰 소견 등)</label>
              <textarea id="student-notes" placeholder="예: 고전문학 세미나에서 발제자로서 두각을 나타냄. 학과 학술 소모임 '한날'의 회장으로 활동함."></textarea>
            </div>
          </div>
        </section>

        <section class="keyword-section card">
          <div class="card-header">
            <h3>추천 키워드 선택</h3>
            <span class="tip-text">복수 선택 가능</span>
          </div>
          <div class="keyword-grid">
            <button class="keyword-btn" data-keyword="성실함">성실함</button>
            <button class="keyword-btn" data-keyword="열정적임">열정적임</button>
            <button class="keyword-btn" data-keyword="리더십 있음">리더십 있음</button>
            <button class="keyword-btn" data-keyword="창의적임">창의적임</button>
            <button class="keyword-btn" data-keyword="책임감">책임감</button>
            <button class="keyword-btn" data-keyword="재능있음">재능있음</button>
            <button class="keyword-btn" data-keyword="신뢰가능함">신뢰가능함</button>
            <button class="keyword-btn" data-keyword="인성이 훌륭함">인성이 훌륭함</button>
          </div>

          <div class="action-bar">
            <button id="generate-btn" class="btn btn-primary btn-large">
              ✨ 추천서 작성하기
            </button>
            <button id="delete-student-btn" class="btn btn-danger-link">
              학생 정보 삭제
            </button>
          </div>
        </section>
      </div>
    </main>

    <!-- 3. RIGHT PANEL: LETTER EDITOR -->
    <section class="editor-panel">
      <div class="editor-header">
        <h3>작성된 추천서 초안</h3>
        <div class="editor-actions">
          <button id="copy-btn" class="btn btn-secondary btn-small">📋 복사하기</button>
        </div>
      </div>
      
      <div class="editor-wrapper">
        <textarea id="recommendation-text" class="recommendation-editor" placeholder="왼쪽에서 학생 정보와 키워드를 선택한 뒤, '추천서 작성하기' 버튼을 누르면 이 곳에 추천서 초안이 작성됩니다. 작성 후 직접 자유롭게 가다듬으실 수 있습니다."></textarea>
        
        <div id="loading-overlay" class="loading-overlay hidden">
          <div class="academic-spinner"></div>
          <p id="loading-message">Gemini가 추천서를 집필 중입니다...</p>
        </div>
      </div>

      <div class="app-footer">
        <div class="connection-status">
          <span class="status-dot green"></span>
          <span id="api-status-text">Gemini API 대기 중</span>
        </div>
        <button id="open-settings-btn" class="settings-btn" title="설정">⚙️</button>
      </div>
    </section>
  </div>

  <!-- SETTINGS MODAL -->
  <div id="settings-modal" class="modal-overlay hidden">
    <div class="modal-content card">
      <div class="modal-header">
        <h3>시스템 구성 및 설정 (Web)</h3>
        <button id="close-settings-btn" class="close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="settings-api-key">Google Gemini API Key</label>
          <input type="password" id="settings-api-key" placeholder="AI 추천서 작성을 위한 API Key 입력..." />
          <p class="help-text">API Key는 브라우저 로컬 저장소에 암호화 없이 보관되므로 교수님 개인 환경에서만 사용을 권장합니다.</p>
        </div>

        <div class="form-group">
          <label for="settings-model">Gemini 추천 모델</label>
          <select id="settings-model">
            <option value="gemini-2.5-flash">Gemini 2.5 Flash (최신 모델 - 권장)</option>
            <option value="gemini-2.0-flash">Gemini 2.0 Flash (속도 우선)</option>
            <option value="gemini-1.5-pro">Gemini 1.5 Pro (문장 품질 우선)</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button id="save-settings-btn" class="btn btn-primary">설정 저장</button>
      </div>
    </div>
  </div>

  <!-- TOAST NOTIFICATION -->
  <div id="toast" class="toast hidden"></div>

  <!-- Main JavaScript module for web version -->
  <script type="module" src="app.js"></script>
</body>
</html>
